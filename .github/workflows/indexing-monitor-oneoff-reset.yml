name: Indexing Monitor - One-Off Reset

# One-time reset run using the default cutoff from config.github.json.

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/indexing-monitor-oneoff-reset.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-reset:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare runtime files
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          temp_dir = Path(os.environ['RUNNER_TEMP'])
          sa_path = temp_dir / 'gsc.json'
          config_in = Path('config.github.json')
          config_out = temp_dir / 'config.json'

          sa_path.write_text(os.environ['GSC_SERVICE_ACCOUNT_JSON'], encoding='utf-8')
          config = json.loads(config_in.read_text(encoding='utf-8'))
          config['service_account_json_path'] = str(sa_path)
          config['db_url'] = os.environ['SUPABASE_DB_URL']
          config_out.write_text(json.dumps(config, ensure_ascii=False, indent=2), encoding='utf-8')
          print(f'Runtime config written to {config_out}')
          PY

      - name: Reset and run indexing monitor
        run: |
          python run_monitor.py --config "$RUNNER_TEMP/config.json" --mode all --reset-db
