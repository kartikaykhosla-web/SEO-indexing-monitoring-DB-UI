name: Keep Streamlit Awake

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping-streamlit:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Streamlit app
        run: |
          curl -I --max-time 60 --retry 2 --retry-delay 5 "https://indexing-monitoring.streamlit.app/"
