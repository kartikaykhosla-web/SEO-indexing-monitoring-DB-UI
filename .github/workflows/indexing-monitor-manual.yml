name: Indexing Monitor - Manual

on:
  workflow_dispatch:
    inputs:
      property:
        description: Optional single property key
        required: false
        default: ''
      mode:
        description: Run mode
        required: false
        default: all
        type: choice
        options:
          - all
          - discover
          - poll
          - export
      cutoff_datetime:
        description: Optional override like 2026-04-17T17:20:00+05:30
        required: false
        default: ''
      reset_db:
        description: Clear Supabase tables before running
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare runtime files
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          CUTOFF_DATETIME: ${{ github.event.inputs.cutoff_datetime }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          temp_dir = Path(os.environ['RUNNER_TEMP'])
          sa_path = temp_dir / 'gsc.json'
          config_in = Path('config.github.json')
          config_out = temp_dir / 'config.json'

          sa_path.write_text(os.environ['GSC_SERVICE_ACCOUNT_JSON'], encoding='utf-8')
          config = json.loads(config_in.read_text(encoding='utf-8'))
          config['service_account_json_path'] = str(sa_path)
          config['db_url'] = os.environ['SUPABASE_DB_URL']

          cutoff = os.environ.get('CUTOFF_DATETIME', '').strip()
          if cutoff:
              config['cutoff_datetime'] = cutoff

          config_out.write_text(json.dumps(config, ensure_ascii=False, indent=2), encoding='utf-8')
          print(f'Runtime config written to {config_out}')
          PY

      - name: Run indexing monitor
        env:
          PROPERTY: ${{ github.event.inputs.property }}
          MODE: ${{ github.event.inputs.mode }}
          RESET_DB: ${{ github.event.inputs.reset_db }}
        run: |
          CMD=(python run_monitor.py --config "$RUNNER_TEMP/config.json")
          if [ -n "$PROPERTY" ]; then
            CMD+=(--property "$PROPERTY")
          fi
          if [ -n "$MODE" ]; then
            CMD+=(--mode "$MODE")
          fi
          if [ "$RESET_DB" = "true" ]; then
            CMD+=(--reset-db)
          fi
          printf 'Running: %s
' "${CMD[*]}"
          "${CMD[@]}"
